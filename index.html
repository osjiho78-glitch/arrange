<script>
let BASE_ORDER = [1,2,3,4,5,6,7]; // 현재 재직중인 직원 번호 목록 (회전의 기준)
let nextStaffId = 8; // 다음 신규 직원에게 부여할 번호
function rotateFrom(startId){
  const idx = BASE_ORDER.indexOf(startId);
  if(idx===-1) return [...BASE_ORDER];
  return BASE_ORDER.slice(idx).concat(BASE_ORDER.slice(0,idx));
}
let partOrder = { A: rotateFrom(1), B: rotateFrom(1), C: rotateFrom(1), D: rotateFrom(1) }; // 파트별 오늘의 시작 순서
const PART_LABEL = {A:'수술상담', B:'시술상담', C:'당일 수술', D:'경과 환자'};
const PART_HEX = {A:'#2F5D82', B:'#B5722E', C:'#6B4F6B', D:'#3D6B5D'};
const NO_COUNT_PARTS = ['D']; // 이 파트는 실적(처리건수)에 카운트되지 않음
const now = () => Date.now();
let pid = 1;

function mkQueue(){ return {waiting:[], done:[]}; }
let partsData = { A: mkQueue(), B: mkQueue(), C: mkQueue(), D: mkQueue() };
let openLists = {};
let selected = { A:new Set(), B:new Set(), C:new Set(), D:new Set() }; // 동반자(팀) 묶기용 선택 상태

let staff = BASE_ORDER.map(id=>({
  id, busy:false, off:false, part:null, patient:null, startedAt:null, sinceAvailable:now(), doneCount:0,
  partDone:{A:0,B:0,C:0,D:0}, partPatients:{A:[],B:[],C:[],D:[]}, expandedPart:null,
  assignedPatient:null, assignedPart:null, lastCompleted:null
}));
let queue = { A:[...partOrder.A], B:[...partOrder.B], C:[...partOrder.C], D:[...partOrder.D] }; // 파트별로 아직 이번 순환에서 응대 안 한 직원 목록 (맨 앞이 다음 차례)
let log = [];
let designatedLog = [];

function seedDemo(){
  const seedCounts = { A:30, B:40, C:20 };
  const t0 = now() - 40*60000;
  Object.keys(seedCounts).forEach(p=>{
    for(let i=1;i<=seedCounts[p];i++){
      partsData[p].waiting.push({id:pid++, name:`환자-${p}${String(i).padStart(2,'0')}`, arrivedAt: t0 + i*45000});
    }
  });
}

function fmtClock(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); }
function fmtHHMM(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtElapsed(ms){ const s=Math.floor(ms/1000); const m=Math.floor(s/60), r=s%60; return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0'); }

window.addPatientUI = function(){
  const part = document.getElementById('inPart').value;
  const name = document.getElementById('inName').value.trim();
  const desig = document.getElementById('inDesig').value;
  if(!name){ alert('환자 이름을 입력해주세요.'); return; }
  if(part==='D' && !desig){ alert('D파트(경과 환자)는 담당(지정) 실장을 반드시 선택해야 합니다.'); return; }

  if(desig){
    const staffId = Number(desig);
    const s = staff.find(x=>x.id===staffId);
    if(s && !s.busy && !s.off && !s.assignedPatient){
      staff = staff.map(x=> x.id===staffId ? {...x, busy:true, part, patient:{id:pid++, name, designated:true}, startedAt:now()} : x);
      document.getElementById('inName').value='';
      renderStaff(); saveState();
      return;
    }
    partsData[part].waiting.push({id:pid++, name, arrivedAt: now(), designatedStaff: staffId});
  } else {
    partsData[part].waiting.push({id:pid++, name, arrivedAt: now(), designatedStaff: null});
  }
  document.getElementById('inName').value='';
  renderQueues(); renderStaff(); saveState();
};
window.bulkAdd = function(){
  const lines = document.getElementById('bulkArea').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length===0) return;
  lines.forEach(line=>{
    const parts_ = line.split(',').map(s=>s.trim());
    if(parts_.length<2) return;
    const [part,name,desig] = parts_;
    if(!['A','B','C','D'].includes(part) || !name) return;
    const desigId = Number(desig);
    if(part==='D' && !(desig && desigId>=1 && desigId<=7)) return; // D파트는 지정 직원 필수
    if(desig && desigId>=1 && desigId<=7){
      const s = staff.find(x=>x.id===desigId);
      if(s && !s.busy && !s.off && !s.assignedPatient){
        staff = staff.map(x=> x.id===desigId ? {...x, busy:true, part, patient:{id:pid++, name, designated:true}, startedAt:now()} : x);
        return;
      }
      partsData[part].waiting.push({id:pid++, name, arrivedAt: now(), designatedStaff: desigId});
    } else {
      partsData[part].waiting.push({id:pid++, name, arrivedAt: now(), designatedStaff: null});
    }
  });
  renderQueues(); renderStaff(); saveState();
};

window.toggleList = function(key){ openLists[key] = !openLists[key]; renderQueues(); };

function renderQueues(){
  const el = document.getElementById('queues');
  el.innerHTML = Object.keys(partsData).map(p=>{
    const q = partsData[p];
    const open = !!openLists[p];
    const sel = selected[p];
    const listHTML = q.waiting.length===0
      ? '<div class="plempty">대기 환자 없음</div>'
      : q.waiting.map((pat,i)=>{
          const isSel = sel.has(pat.id);
          if(pat.isTeam){
            return `<div class="prow ${isSel?'selected':''}" onclick="handleRowClick(event,'${p}',${pat.id})">
              <span class="pn">${i+1}</span>
              <span class="teambadge">팀</span>
              <span class="pname">${pat.name}</span>
              <span class="ptime">${fmtHHMM(pat.arrivedAt)} 내원</span>
              <button onclick="event.stopPropagation();ungroupTeam('${p}',${pat.id})">해제</button>
              <button class="assignbtn-row" onclick="event.stopPropagation();openAssignPickerFor('${p}',${pat.id})">배분</button>
            </div>`;
          }
          return `<div class="prow ${isSel?'selected':''}" onclick="handleRowClick(event,'${p}',${pat.id})">
            <span class="pn">${i+1}</span>
            <span class="pname">${pat.name}${pat.designatedStaff?` <span class="designatedbadge" style="margin-left:4px;">직원${pat.designatedStaff} 지정</span>`:''}</span>
            <span class="ptime">${fmtHHMM(pat.arrivedAt)} 내원</span>
            <button class="assignbtn-row" onclick="event.stopPropagation();openAssignPickerFor('${p}',${pat.id})">배분</button>
          </div>`;
        }).join('');
    const selCount = sel.size;
    const groupbarHTML = selCount>0 ? `<div class="groupbar">
        <span>${selCount}명 선택됨</span>
        ${selCount>=2 ? `<button class="primary" onclick="groupSelected('${p}')">팀으로 묶기</button>` : ''}
        <button onclick="clearSelection('${p}')">선택 해제</button>
      </div>` : '';
    return `<div class="qcard">
      <div class="head"><span class="qtag ${p}">${p} 파트 · ${PART_LABEL[p]}</span><span class="qmeta">완료 ${q.done.length}</span></div>
      <div class="typehead" onclick="toggleList('${p}')">
        <span class="typename">대기 인원 <span style="font-size:10px;">(클릭/배분: 다음 순번 실장에게 자동 배정 · Ctrl+클릭: 동반자 선택)</span></span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="typecount">${q.waiting.length}</span><span class="typename">명</span>
          <span class="caret ${open?'open':''}">▶</span>
        </div>
      </div>
      <div class="patientlist ${open?'open':''}">${listHTML}${groupbarHTML}</div>
    </div>`;
  }).join('');
}

window.handleRowClick = function(event, part, id){
  if(event.ctrlKey || event.metaKey){
    const s = selected[part];
    if(s.has(id)) s.delete(id); else s.add(id);
    renderQueues();
    return;
  }
  autoAssignPatient(part, id);
};

window.openAssignPickerFor = function(part, patientId){
  autoAssignPatient(part, patientId);
};

window.autoAssignPatient = function(part, patientId){
  const q = partsData[part];
  const idx = q.waiting.findIndex(p=>p.id===patientId);
  if(idx===-1) return;
  const pat = q.waiting[idx];

  let staffId;
  if(pat.designatedStaff){
    const s = staff.find(x=>x.id===pat.designatedStaff);
    if(!s || s.busy || s.off || s.assignedPatient){ alert(`지정된 직원 ${pat.designatedStaff}이(가) 지금 바빠서 배정할 수 없습니다. 비면 다시 시도해주세요.`); return; }
    staffId = s.id;
  } else {
    const candidate = queue[part].find(sid=>{
      const s = staff.find(x=>x.id===sid);
      return s && !s.busy && !s.off && !s.assignedPatient;
    });
    if(!candidate){ alert('지금 배정 가능한 직원이 없습니다.'); return; }
    staffId = candidate;
  }

  q.waiting.splice(idx,1);
  const isDesignatedMatch = !!pat.designatedStaff;
  if(!isDesignatedMatch){
    const qi = queue[part].indexOf(staffId);
    if(qi!==-1) queue[part].splice(qi,1);
    if(queue[part].length===0){ queue[part] = [...partOrder[part]]; }
  }

  staff = staff.map(x=> x.id===staffId ? {...x, assignedPatient:{...pat, designated:isDesignatedMatch}, assignedPart:part, lastCompleted:null} : x);
  renderQueues(); renderStaff(); saveState();
};

window.groupSelected = function(part){
  const ids = Array.from(selected[part]);
  if(ids.length<2){ alert('2명 이상 선택해주세요.'); return; }
  const q = partsData[part];
  const chosenWithIdx = [];
  q.waiting.forEach((pat,i)=>{ if(ids.includes(pat.id)) chosenWithIdx.push({pat,i}); });
  if(chosenWithIdx.length<2){ selected[part] = new Set(); renderQueues(); return; }

  const insertIdx = Math.min(...chosenWithIdx.map(x=>x.i));
  const members = chosenWithIdx.map(x=>({id:x.pat.id, name:x.pat.name, arrivedAt:x.pat.arrivedAt}));
  const earliestArrived = Math.min(...members.map(m=>m.arrivedAt));
  const team = { id: pid++, isTeam:true, members, name: members.map(m=>m.name).join(' · '), arrivedAt: earliestArrived };

  let newPos = 0;
  for(let i=0;i<insertIdx;i++){ if(!ids.includes(q.waiting[i].id)) newPos++; }
  const remaining = q.waiting.filter(pat=>!ids.includes(pat.id));
  remaining.splice(newPos,0,team);
  q.waiting = remaining;

  selected[part] = new Set();
  renderQueues(); saveState();
};

window.ungroupTeam = function(part, teamId){
  const q = partsData[part];
  const idx = q.waiting.findIndex(pat=>pat.id===teamId && pat.isTeam);
  if(idx===-1) return;
  const team = q.waiting[idx];
  const restored = team.members.map(m=>({id:m.id, name:m.name, arrivedAt:m.arrivedAt}));
  q.waiting.splice(idx,1,...restored);
  renderQueues(); saveState();
};

function renderStartPanel(){
  const el = document.getElementById('startPanel');
  el.innerHTML = ['A','B','C'].map(p=>{
    const opts = BASE_ORDER.map(id=>`<option value="${id}" ${partOrder[p][0]===id?'selected':''}>직원 ${id}</option>`).join('');
    return `<div class="startfield">
      <label>${p} 파트 (${PART_LABEL[p]}) 시작 직원</label>
      <select id="startSel_${p}">${opts}</select>

    </div>`;
  }).join('') + `<button class="startapply" onclick="applyStartOrders()">오늘 순서로 적용</button>`;
}

window.applyStartOrders = function(){
  ['A','B','C'].forEach(p=>{
    const startId = Number(document.getElementById('startSel_'+p).value);
    partOrder[p] = rotateFrom(startId);
    queue[p] = [...partOrder[p]];
  });
  renderStartPanel(); renderStaff(); saveState();
};

window.undoSeenPatient = function(staffId, part, patientId){
  const s = staff.find(x=>x.id===staffId);
  const rec = s.partPatients[part].find(p=>p.id===patientId);
  if(!rec) return;
  if(!confirm(`${rec.name} 님의 ${part}파트 응대 기록을 취소하고 대기열로 되돌릴까요?`)) return;

  const newPartPatients = { ...s.partPatients, [part]: s.partPatients[part].filter(p=>p.id!==patientId) };
  const newPartDone = { ...s.partDone, [part]: Math.max(0, s.partDone[part]-1) };
  staff = staff.map(x=> x.id===staffId ? {...x, partPatients:newPartPatients, partDone:newPartDone, doneCount:Math.max(0,x.doneCount-1)} : x);

  partsData[part].done = partsData[part].done.filter(p=>p.id!==patientId);
  partsData[part].waiting.unshift({...rec});

  log = log.filter(l => !(l.staffId===staffId && l.part===part && l.patient.id===patientId));

  if(!queue[part].includes(staffId)) queue[part].unshift(staffId);

  renderQueues(); renderStaff(); renderStats(); renderLog(); saveState();
};

window.addStaffMember = function(){
  const id = nextStaffId++;
  staff.push({ id, busy:false, off:false, part:null, patient:null, startedAt:null, sinceAvailable:now(), doneCount:0,
    partDone:{A:0,B:0,C:0,D:0}, partPatients:{A:[],B:[],C:[],D:[]}, expandedPart:null, assignedPatient:null, assignedPart:null, lastCompleted:null });
  BASE_ORDER.push(id);
  ['A','B','C','D'].forEach(p=>{
    partOrder[p].push(id);
    queue[p].push(id);
  });
  renderManagePanel(); renderStartPanel(); renderStaff(); saveState();
};

window.removeStaffMember = function(id){
  const s = staff.find(x=>x.id===id);
  if(!s) return;
  if(s.busy || s.assignedPatient){ alert('상담중이거나 배정된 환자가 있는 직원은 처리 후 삭제해주세요.'); return; }
  if(!confirm(`직원 ${id}을(를) 퇴사 처리하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;

  staff = staff.filter(x=>x.id!==id);
  BASE_ORDER = BASE_ORDER.filter(x=>x!==id);
  ['A','B','C','D'].forEach(p=>{
    partOrder[p] = partOrder[p].filter(x=>x!==id);
    queue[p] = queue[p].filter(x=>x!==id);
    if(queue[p].length===0 && partOrder[p].length>0){ queue[p] = [...partOrder[p]]; }
    partsData[p].waiting.forEach(pat=>{ if(pat.designatedStaff===id) pat.designatedStaff = null; });
  });

  renderManagePanel(); renderStartPanel(); renderQueues(); renderStaff(); saveState();
};

function renderStaff(){
  const grid = document.getElementById('staffgrid');
  grid.innerHTML = staff.map(s=>{
    const statChips = ['A','B','C','D'].map(p=>`<div class="pstatchip ${s.expandedPart===p?'expanded':''}" onclick="toggleSeenList(${s.id},'${p}')"><span>${p}</span><b>${s.partDone[p]}</b></div>`).join('');
    const seenListHTML = s.expandedPart ? (()=>{
      const list = s.partPatients[s.expandedPart];
      if(list.length===0) return `<div class="seenlist"><div class="seenempty">오늘 ${s.expandedPart}파트 응대 기록 없음</div></div>`;
      return `<div class="seenlist">${list.map(pt=>`<div class="seenrow"><span>${pt.name}</span><span class="stime">${fmtClock(pt.time)}</span><button class="seen-undo-btn" onclick="undoSeenPatient(${s.id},'${s.expandedPart}',${pt.id})">↺ 되돌리기</button></div>`).join('')}</div>`;
    })() : '';

    if(s.off){
      return `<div class="tile off">
        <div class="toprow"><span class="name">직원 ${s.id}</span><button class="offtoggle isoff" onclick="toggleOff(${s.id})">근무 복귀</button></div>
        <div class="cur" style="margin-top:6px;">● 오늘 휴무</div>
        <div class="partstats">${statChips}</div>
        ${seenListHTML}
      </div>`;
    }

    if(s.assignedPatient){
      return `<div class="tile assigned">
        <div class="toprow"><span class="name">직원 ${s.id}</span><span class="status" style="color:#3B78C2;">● 배정됨 (상담 대기)</span></div>
        <button class="undobtn" onclick="undoAssign(${s.id})">↺ 되돌리기 (배정 취소)</button>
        <div class="cur">${s.assignedPart}(${PART_LABEL[s.assignedPart]}) · ${s.assignedPatient.name}</div>
        <div class="partstats">${statChips}</div>
        ${seenListHTML}
        <button class="assignedbtn" onclick="beginConsult(${s.id})">▶ 상담 들어가기</button>
      </div>`;
    }

    if(s.busy){
      const elapsed = now() - s.startedAt;
      return `<div class="tile busy">
        <div class="toprow"><span class="name">직원 ${s.id}</span><span class="status"><span class="dot r"></span>상담중${s.patient.designated?'<span class="designatedbadge">지정</span>':''}</span></div>
        <button class="undobtn" onclick="undoBegin(${s.id})">↺ 되돌리기 (상담 시작 취소)</button>
        <div class="timer" onclick="endService(${s.id})" style="cursor:pointer;" title="클릭하면 완료 처리">${fmtElapsed(elapsed)}</div>
        <div class="cur">${s.part}(${PART_LABEL[s.part]}) · ${s.patient.name}</div>
        <div class="partstats">${statChips}</div>
        ${seenListHTML}
        <div class="partbuttons">
          ${['A','B','C','D'].map(p=>`<button class="pbtn" style="background:${PART_HEX[p]};opacity:.3;" disabled>${p}</button>`).join('')}
        </div>
      </div>`;
    }

    const idleFor = now() - s.sinceAvailable;
    const btns = ['A','B','C','D'].map(p=>{
      const isD = p === 'D';
      const n = isD ? partsData[p].waiting.filter(pt=>pt.designatedStaff===s.id).length : partsData[p].waiting.length;
      const onTurn = isD ? false : (queue[p].find(sid => !staff.find(x=>x.id===sid).off) === s.id);
      return `<button class="pbtn ${onTurn?'onturn':''}" style="background:${PART_HEX[p]};" ${n===0?'disabled':''} onclick="startService(${s.id},'${p}')">${p}</button>`;
    }).join('');

    return `<div class="tile available">
      <div class="toprow"><span class="name">직원 ${s.id}</span><button class="offtoggle" onclick="toggleOff(${s.id})">휴무 처리</button></div>

  }).join('');
  document.getElementById('staffCountTitle').textContent = `직원 현황 (${staff.length}명)`;
  renderInDesigOptions();
  if(managePanelOpen) renderManagePanel();
}

window.toggleSeenList = function(id, part){
  staff = staff.map(s=> s.id===id ? {...s, expandedPart: s.expandedPart===part ? null : part} : s);
  renderStaff();
};

window.toggleOff = function(id){
  const s = staff.find(x=>x.id===id);
  if(s.busy || s.assignedPatient){ alert('상담중이거나 배정된 환자가 있는 직원은 처리 후 휴무 처리해주세요.'); return; }
  staff = staff.map(x=> x.id===id ? {...x, off:!x.off, sinceAvailable:now()} : x);
  renderStaff(); saveState();
};

window.startService = function(id, part){
  const cur = staff.find(x=>x.id===id);
  if(!cur || cur.busy || cur.assignedPatient || cur.off){ return; }
  const q = partsData[part];
  if(q.waiting.length===0){ alert('대기 환자가 없습니다.'); return; }

  const isD = part === 'D';
  let idx = q.waiting.findIndex(p=>p.designatedStaff===id);
  const isDesignatedMatch = idx!==-1;

  if(isD){
    if(!isDesignatedMatch){ alert('경과 환자는 담당(지정) 실장만 볼 수 있습니다.'); return; }
  } else if(!isDesignatedMatch){
    idx = q.waiting.findIndex(p=>!p.designatedStaff);
    if(idx===-1){ alert('지정되지 않은 대기 환자가 없습니다 (남은 인원은 다른 직원에게 지정됨).'); return; }
  }

  const patient = q.waiting.splice(idx,1)[0];

  if(!isD && !isDesignatedMatch){
    const qi = queue[part].indexOf(id);
    if(qi!==-1) queue[part].splice(qi,1);
    if(queue[part].length===0){ queue[part] = [...partOrder[part]]; }
  }

  staff = staff.map(s=> s.id===id ? {...s, assignedPatient:{...patient, designated:isDesignatedMatch}, assignedPart:part, lastCompleted:null} : s);
  renderQueues(); renderStaff(); saveState();
};

window.beginConsult = function(id){
  const s = staff.find(x=>x.id===id);
  if(!s || !s.assignedPatient) return;
  staff = staff.map(x=> x.id===id ? {...x, busy:true, part:x.assignedPart, patient:x.assignedPatient, assignedPatient:null, assignedPart:null, startedAt:now()} : x);
  renderStaff(); saveState();
};

window.endService = function(id){
  const s = staff.find(x=>x.id===id);
  const end = now();
  const durationMs = end - s.startedAt;
  const isNoCount = s.patient.designated || NO_COUNT_PARTS.includes(s.part);

  if(isNoCount){
    const reason = s.patient.designated ? '지정' : PART_LABEL[s.part];
    designatedLog.unshift({staffId:id, part:s.part, name:s.patient.name, start:s.startedAt, end, durationMs, reason});
    staff = staff.map(x=> x.id===id ? {...x, busy:false, part:null, patient:null, startedAt:null, sinceAvailable:now(),
      lastCompleted:{part:s.part, patient:s.patient, wasDesignated:true}} : x);
    renderQueues(); renderStaff(); renderDesignatedLog(); saveState();
    return;
  }

  log.unshift({staffId:id, part:s.part, patient:s.patient, start:s.startedAt, end, durationMs});
  partsData[s.part].done.push(s.patient);
  const newPartDone = {...s.partDone, [s.part]: s.partDone[s.part]+1};
  const newPartPatients = {...s.partPatients, [s.part]: [...s.partPatients[s.part], {...s.patient, time:end}]};
  staff = staff.map(x=> x.id===id ? {...x, busy:false, part:null, patient:null, startedAt:null, sinceAvailable:now(),
    doneCount:x.doneCount+1, partDone:newPartDone, partPatients:newPartPatients,
    lastCompleted:{part:s.part, patient:s.patient, wasDesignated:false}} : x);
  renderQueues(); renderStaff(); renderStats(); renderLog(); saveState();
};

window.undoAssign = function(id){
  const s = staff.find(x=>x.id===id);
  if(!s || !s.assignedPatient) return;
  const part = s.assignedPart;
  const patient = s.assignedPatient;
  if(!patient.designated){
    if(!queue[part].includes(id)) queue[part].unshift(id);
  }
  partsData[part].waiting.unshift({...patient});
  staff = staff.map(x=> x.id===id ? {...x, assignedPatient:null, assignedPart:null, sinceAvailable:now()} : x);
  renderQueues(); renderStaff(); saveState();
};

window.undoBegin = function(id){
  const s = staff.find(x=>x.id===id);
  if(!s || !s.busy) return;
  staff = staff.map(x=> x.id===id ? {...x, busy:false, assignedPatient:x.patient, assignedPart:x.part, patient:null, part:null, startedAt:null} : x);
  renderStaff(); saveState();
};

window.undoComplete = function(id){
  const s = staff.find(x=>x.id===id);
  if(!s || !s.lastCompleted) return;
  const { part, patient, wasDesignated } = s.lastCompleted;

  if(wasDesignated){
    const di = designatedLog.findIndex(l=>l.staffId===id && l.part===part && l.name===patient.name);
    if(di!==-1) designatedLog.splice(di,1);
    partsData[part].waiting.unshift({...patient});
    staff = staff.map(x=> x.id===id ? {...x, lastCompleted:null} : x);
    renderQueues(); renderStaff(); renderDesignatedLog(); saveState();
    return;
  }

  const newPartPatients = { ...s.partPatients, [part]: s.partPatients[part].filter(p=>p.id!==patient.id) };
  const newPartDone = { ...s.partDone, [part]: Math.max(0, s.partDone[part]-1) };
  partsData[part].done = partsData[part].done.filter(p=>p.id!==patient.id);
  partsData[part].waiting.unshift({...patient});
  log = log.filter(l => !(l.staffId===id && l.part===part && l.patient.id===patient.id));
  if(!queue[part].includes(id)) queue[part].unshift(id);

  staff = staff.map(x=> x.id===id ? {...x, partPatients:newPartPatients, partDone:newPartDone, doneCount:Math.max(0,x.doneCount-1), lastCompleted:null} : x);
  renderQueues(); renderStaff(); renderStats(); renderLog(); saveState();
};

function renderStats(){
  const total = staff.reduce((s,x)=>s+x.doneCount,0);
  let totalWaiting=0;
  Object.keys(partsData).forEach(p=>{ totalWaiting+=partsData[p].waiting.length; });
  const durs = log.map(l=>l.durationMs);
  const avg = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length/1000/60*10)/10 : 0;
  const counts = staff.map(s=>s.doneCount);
  const dev = counts.length? Math.max(...counts)-Math.min(...counts) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="v">${total}</div><div class="l">총 응대 완료</div></div>
    <div class="stat"><div class="v">${totalWaiting}</div><div class="l">전체 대기 인원</div></div>
    <div class="stat"><div class="v">${avg}분</div><div class="l">평균 응대 시간</div></div>
    <div class="stat"><div class="v">${dev}</div><div class="l">직원 간 처리건수 편차</div></div>
  `;
}

function renderLog(){
  const wrap = document.getElementById('logwrap');
  if(log.length===0){ wrap.innerHTML = '<div class="empty-log">아직 완료된 응대가 없습니다.</div>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>파트</th><th>구분</th><th>환자</th><th>담당 직원</th><th>시작</th><th>종료</th><th>소요</th></tr></thead>
    <tbody>${log.map(l=>`
      <tr>
        <td><span class="qtag ${l.part}">${l.part}</span></td>
        <td>${PART_LABEL[l.part]}</td>
        <td>${l.patient.name}</td>
        <td><b>직원 ${l.staffId}</b></td>
        <td style="font-family:'IBM Plex Mono',monospace;">${fmtClock(l.start)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;">${fmtClock(l.end)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;">${fmtElapsed(l.durationMs)}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

let suppressSave = false; // 원격 변경 반영 중에는 재저장 방지

function saveState(){
  if(suppressSave) return;
  const snapshot = { staff, partsData, queue, partOrder, log, designatedLog, pid, nextStaffId, BASE_ORDER, updatedAt: Date.now() };
  boardRef.set(snapshot).catch(e=>{ console.error('저장 실패', e); setSyncStatus('저장 실패 (네트워크 확인)', true); });
}

function loadState(data){
  suppressSave = true;
  staff = data.staff || staff;
  partsData = data.partsData || partsData;
  queue = data.queue || queue;
  partOrder = data.partOrder || partOrder;
  log = data.log || log;
  designatedLog = data.designatedLog || designatedLog;
  pid = data.pid || pid;
  nextStaffId = data.nextStaffId || nextStaffId;
  BASE_ORDER = data.BASE_ORDER || BASE_ORDER;
  renderQueues(); renderStartPanel(); renderStaff(); renderStats(); renderLog(); renderDesignatedLog();
  suppressSave = false;
  setSyncStatus('실시간 동기화 중', false);
}

function setSyncStatus(text, isError){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = text;
  el.style.color = isError ? 'var(--busy)' : 'var(--ok)';
}

boardRef.get().then(doc=>{
  if(doc.exists){
    loadState(doc.data());
  } else {
    seedDemo();
    renderQueues(); renderStartPanel(); renderStaff(); renderStats(); renderLog(); renderDesignatedLog();
    saveState();
    setSyncStatus('실시간 동기화 중', false);
  }
  boardRef.onSnapshot(snap=>{
    if(snap.exists) loadState(snap.data());
  }, err=>{ console.error(err); setSyncStatus('연결 끊김', true); });
}).catch(e=>{
  console.error('Firebase 연결 실패, 로컬 모드로 실행', e);
  seedDemo();
  renderQueues(); renderStartPanel(); renderStaff(); renderStats(); renderLog(); renderDesignatedLog();
  setSyncStatus('오프라인(로컬만 저장)', true);
});

setInterval(()=>{ renderStaff(); }, 1000);
</script>
